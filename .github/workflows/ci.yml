name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Run demo
        run: moon run cmd/main
