name: Feature request
description: Propose a new algorithm, API, export format, or example.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be added?
      placeholder: "Add bidirectional BFS for unweighted grids."
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Who needs this, and what workflow does it improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Include a small MoonBit example if useful.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should we know the feature is done?
      placeholder: |
        - Tests cover reachable and unreachable cases.
        - README includes a minimal example.
        - CHANGELOG records the addition.

